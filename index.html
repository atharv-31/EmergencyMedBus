<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emergency MedBus System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>🚑 Emergency MedBus System</h1>
  <img class="img" src="Logo.png" alt="MedBus Logo" width="128" height="128" />

  <!-- Form Section -->
  <div class="form-container">
    <h2>Raise Emergency Request</h2>
    <form id="requestForm">
      <label for="name">Name:</label>
      <input type="text" id="name" placeholder="Enter full name" required>

      <label for="age">Age:</label>
      <input type="number" id="age" placeholder="Enter age" required>

      <label for="location">Location:</label>
      <input type="text" id="location" placeholder="Enter your current location" required>

      <label for="contact">Contact:</label>
      <input type="text" id="contact" placeholder="Enter contact number" required>

      <label for="emergency">Emergency Type:</label>
      <input type="text" id="emergency" placeholder="Type of emergency (e.g., accident, heart attack)" required>

      <button type="submit">Submit Request</button>
    </form>
  </div>

  <!-- Request Section -->
  <div id="requests">
    <h2>All Emergency Requests</h2>
    <button onclick="fetchRequests()">View Requests</button>

    <table id="requestTable">
      <thead>
        <tr>
          <th>Request ID</th>
          <th>Name</th>
          <th>Age</th>
          <th>Location</th>
          <th>Contact</th>
          <th>Emergency</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
